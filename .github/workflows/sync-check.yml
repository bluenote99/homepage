name: KOR/ENG Sync Check

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'en/index.html'

jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect one-sided change
        id: check
        run: |
          # On the very first commit there is no parent — skip the check.
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "kind=ok" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files in this push:"
          echo "$CHANGED"

          KOR=0
          ENG=0
          if echo "$CHANGED" | grep -qx 'index.html'; then KOR=1; fi
          if echo "$CHANGED" | grep -qx 'en/index.html'; then ENG=1; fi

          if [ "$KOR" = "1" ] && [ "$ENG" = "0" ]; then
            echo "kind=kor-only" >> "$GITHUB_OUTPUT"
          elif [ "$KOR" = "0" ] && [ "$ENG" = "1" ]; then
            echo "kind=eng-only" >> "$GITHUB_OUTPUT"
          else
            echo "kind=ok" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on commit (KOR only)
        if: steps.check.outputs.kind == 'kor-only'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                '⚠️ **Sync reminder**: `index.html` (Korean) was updated but `en/index.html` (English) was not.',
                '',
                'Please update the English version to match. See [README.md](../blob/main/README.md#한영-동기화-규칙) for the sync checklist.'
              ].join('\n')
            });

      - name: Comment on commit (ENG only)
        if: steps.check.outputs.kind == 'eng-only'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                '⚠️ **Sync reminder**: `en/index.html` (English) was updated but `index.html` (Korean) was not.',
                '',
                'Please update the Korean version to match. See [README.md](../blob/main/README.md#한영-동기화-규칙) for the sync checklist.'
              ].join('\n')
            });
